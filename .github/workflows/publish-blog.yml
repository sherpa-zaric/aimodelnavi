name: Publish Blog Post

on:
  workflow_dispatch:
    inputs:
      content:
        description: "Chinese markdown content (body only, no frontmatter)"
        required: true
        type: string
      title:
        description: "Chinese title"
        required: true
        type: string
      tag:
        description: "Blog tag (e.g. Anthropic, OpenAI, Google)"
        required: false
        default: "解説"
        type: string
      excerpt:
        description: "Chinese excerpt (optional, LLM generates Japanese one if empty)"
        required: false
        type: string
      images:
        description: "Comma-separated image URLs to download (optional)"
        required: false
        type: string

jobs:
  translate-and-publish:
    runs-on: ubuntu-latest
    environment: LLM_API_KEY
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - name: Translate and publish blog post (Japanese)
        id: translate
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
          CONTENT: ${{ inputs.content }}
          TITLE: ${{ inputs.title }}
          TAG: ${{ inputs.tag || '解説' }}
          EXCERPT: ${{ inputs.excerpt || '' }}
        run: |
          printf '%s' "$CONTENT" | npx tsx scripts/translate-blog.ts \
            --title "$TITLE" \
            --tag "$TAG" \
            --excerpt "$EXCERPT" \
            --stdin

      - name: Generate English blog post
        id: translate-en
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
        run: |
          SLUG=$(ls -t src/content/blog/*.md 2>/dev/null | head -1 | xargs -I{} basename {} .md)
          if [ -z "$SLUG" ]; then
            echo "No JA blog post found, skipping EN generation"
            exit 0
          fi

          echo "Generating EN version for slug: $SLUG"
          npx tsx -e "
            const { processBlogArticleEn } = require('./scripts/lib/anthropic');
            const { saveBlogPostEn } = require('./scripts/lib/storage');
            const fs = require('fs');
            const path = require('path');
            const matter = require('gray-matter');

            async function main() {
              const jaPath = path.join('src/content/blog', '${SLUG}.md');
              const raw = fs.readFileSync(jaPath, 'utf-8');
              const { data, content } = matter(raw);

              const result = await processBlogArticleEn(data.title, content, '');
              saveBlogPostEn('${SLUG}', {
                title: result.title,
                date: data.date || new Date().toISOString().split('T')[0],
                tag: result.tag || data.tag,
                excerpt: result.excerpt,
              }, result.content);
              console.log('EN version saved: ' + result.title);
            }
            main().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Download images
        run: |
          # Find the slug from the newly created blog post
          SLUG=$(ls -t src/content/blog/*.md 2>/dev/null | head -1 | xargs -I{} basename {} .md)
          if [ -z "$SLUG" ]; then
            echo "No blog post found, skipping images"
            exit 0
          fi

          BLOG_FILE="src/content/blog/${SLUG}.md"
          if [ ! -f "$BLOG_FILE" ]; then
            echo "Blog file not found: $BLOG_FILE"
            exit 0
          fi

          echo "Processing images for slug: $SLUG"

          # Extract all image URLs from markdown (both local /images/ and external http(s) URLs)
          # Match: ![...](url) or <img src="url">
          URLS=$(grep -oE '!\[[^]]*\]\([^)]+\)|<img[^>]+src="[^"]+' "$BLOG_FILE" \
            | grep -oE 'https?://[^")\s]+' \
            | grep -qiE '\.(jpg|jpeg|png|gif|webp|svg|avif)(\?|$)|images\.unsplash\.com|pbs\.twimg\.com|imgur\.com|cloudinary\.com|cdn\.openai\.com|storage\.googleapis\.com|mmbiz\.qpic\.cn' \
            && grep -oE '!\[[^]]*\]\([^)]+\)|<img[^>]+src="[^"]+' "$BLOG_FILE" \
            | grep -oE 'https?://[^")\s]+' \
            | grep -iE '\.(jpg|jpeg|png|gif|webp|svg|avif)(\?|$)|images\.unsplash\.com|pbs\.twimg\.com|imgur\.com|cloudinary\.com|cdn\.openai\.com|storage\.googleapis\.com|mmbiz\.qpic\.cn' \
            | sort -u)

          if [ -z "$URLS" ]; then
            echo "No external image URLs found in markdown"
            exit 0
          fi

          IMG_COUNT=$(echo "$URLS" | wc -l | xargs)
          echo "Found $IMG_COUNT external image URLs"

          IMG_DIR="public/images/blog/$SLUG"
          mkdir -p "$IMG_DIR"

          IMG_INDEX=1
          while IFS= read -r url; do
            [ -z "$url" ] && continue

            # Determine extension from URL
            EXT="webp"
            if echo "$url" | grep -qiE '\.(jpg|jpeg)(\?|$)'; then EXT="jpg"
            elif echo "$url" | grep -qiE '\.png(\?|$)'; then EXT="png"
            elif echo "$url" | grep -qiE '\.gif(\?|$)'; then EXT="gif"
            elif echo "$url" | grep -qiE '\.webp(\?|$)'; then EXT="webp"
            elif echo "$url" | grep -qiE '\.avif(\?|$)'; then EXT="avif"
            fi

            FILENAME="img-${IMG_INDEX}.${EXT}"
            echo "  [$IMG_INDEX/$IMG_COUNT] Downloading: $url"

            # Determine headers based on URL domain
            CURL_HEADERS="-H 'User-Agent: AIModelsNavi/1.0'"
            if echo "$url" | grep -q "mp.weixin.qq.com"; then
              CURL_HEADERS="-H 'User-Agent: AIModelsNavi/1.0' -H 'Referer: https://mp.weixin.qq.com/'"
            fi

            if eval curl -sL -o "\"$IMG_DIR/$FILENAME\"" $CURL_HEADERS --max-time 15 "\"$url\""; then
              FILESIZE=$(stat -c%s "$IMG_DIR/$FILENAME" 2>/dev/null || stat -f%z "$IMG_DIR/$FILENAME" 2>/dev/null || echo 0)
              if [ "$FILESIZE" -gt 1024 ]; then
                echo "    ✓ Downloaded ($FILESIZE bytes)"
                IMG_INDEX=$((IMG_INDEX + 1))
              else
                echo "    ✗ File too small ($FILESIZE bytes), skipping"
                rm -f "$IMG_DIR/$FILENAME"
              fi
            else
              echo "    ✗ Download failed"
            fi
          done <<< "$URLS"

          # Update markdown image references to local paths
          if [ "$IMG_INDEX" -gt 1 ]; then
            echo ""
            echo "Updating image references in $BLOG_FILE..."
            # Replace external URLs with local paths
            IMG_NUM=1
            while IFS= read -r url; do
              [ -z "$url" ] && continue
              DOWNLOADED=$(ls "$IMG_DIR/img-${IMG_NUM}".* 2>/dev/null | head -1)
              if [ -n "$DOWNLOADED" ]; then
                LOCAL_PATH="/images/blog/$SLUG/$(basename "$DOWNLOADED")"
                ESCAPED_URL=$(echo "$url" | sed 's/[&/\]/\\&/g')
                ESCAPED_PATH=$(echo "$LOCAL_PATH" | sed 's/[&/\]/\\&/g')
                sed -i "s|$ESCAPED_URL|$ESCAPED_PATH|g" "$BLOG_FILE"
                echo "  ✓ img-${IMG_NUM}: $LOCAL_PATH"
                IMG_NUM=$((IMG_NUM + 1))
              fi
            done <<< "$URLS"
            echo "  Done: $((IMG_NUM - 1)) images processed"
          fi

      - name: Regenerate manifests
        run: |
          npx tsx scripts/blog-manifest.ts || true
          npx tsx scripts/generate-english-manifest.ts || true

      - name: Commit and push
        run: |
          if [ -n "$(git status --porcelain src/content/ public/images/ src/data/blog-manifest*.json)" ]; then
            git config user.name "coder"
            git config user.email "focusteczzc@163.com"
            git add src/content/ public/images/ src/data/blog-manifest*.json
            git commit -m "blog: publish translated post — ${{ inputs.title }}"
            git pull --rebase origin main || true
            git push
            echo "✓ Blog post published and pushed"
          else
            echo "No changes detected — translation may have failed"
            exit 1
          fi

name: Daily Pipeline Sync

on:
  schedule:
    # Run 3x daily: JST 09:00 / 17:00 / 01:00 (UTC 00:00 / 08:00 / 16:00)
    - cron: "7 0,8,16 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode (incremental or full)"
        default: "incremental"
        required: true

jobs:
  sync-pipeline:
    runs-on: ubuntu-latest
    environment: LLM_API_KEY
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full pipeline (crawl, process, translate, leaderboard, pricing, blog, generate)
        timeout-minutes: 15
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
          CRAWL_MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: npx tsx scripts/sync-all.ts

      - name: Run blog generation
        if: always()
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
        run: npx tsx scripts/generate-blog.ts

      - name: Commit and push changes
        if: always()
        run: |
          if [ -n "$(git status --porcelain src/data/ data/ src/content/ public/images/)" ]; then
            git config user.name "coder"
            git config user.email "focusteczzc@163.com"
            git add src/data/ data/ src/content/ public/images/
            git commit -m "auto: daily pipeline sync $(date +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push
          else
            echo "No changes to commit"
          fi
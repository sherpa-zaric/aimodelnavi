name: Daily Pipeline Sync

on:
  schedule:
    # Run daily at 07:00 UTC (16:00 JST)
    - cron: "3 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode (incremental or full)"
        default: "incremental"
        required: true

jobs:
  sync-pipeline:
    runs-on: ubuntu-latest
    environment: LLM_API_KEY
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full pipeline (crawl, process, translate, leaderboard, pricing, blog, generate)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
          CRAWL_MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: npx tsx scripts/sync-all.ts

      - name: Run blog generation
        if: always()
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'ollama' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gemma4:31b' }}
        run: npx tsx scripts/generate-blog.ts

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain src/data/ data/ src/content/)" ]; then
            git config user.name "aimodelsnavi-bot"
            git config user.email "bot@aimodelsnavi.com"
            git add src/data/ data/ src/content/
            git commit -m "auto: daily pipeline sync $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
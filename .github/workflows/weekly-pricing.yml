name: Weekly API Pricing Sync

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  sync-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Sync pricing data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/sync-pricing.ts

      - name: Commit changes if any
        run: |
          if [ -n "$(git diff --name-only)" ] || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git config user.name "aimodelnavi-bot"
            git config user.email "bot@aimodelnavi.jp"
            git add src/data/pricing.ts
            git commit -m "auto: weekly pricing sync $(date +%Y-%m-%d)"
            git push
          fi